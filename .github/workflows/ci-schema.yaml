name: Schema CI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/ci-schema.yaml
      - schema/**
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ci-schema.yaml
      - schema/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate schemas and values file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Validate fixtures and values against schemas
        run: make validate-schema

  lint-go:
    name: Lint Go module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: schema/go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.10.1
          working-directory: schema

  test-go:
    name: Test Go module
    needs: [validate, lint-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: schema/go.mod

      - name: Test
        working-directory: schema
        run: go test -race -count=1 ./...

  test-python:
    name: Test Python package
    needs: [validate]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Test
        run: make setup-schema test-schema-python
