name: Skill prompt sync check

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/ci-skill-sync.yaml
      - plugins/cq/skills/cq/SKILL.md
      - sdk/go/internal/protocol/SKILL.md
      - sdk/python/src/cq/protocol/SKILL.md
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ci-skill-sync.yaml
      - plugins/cq/skills/cq/SKILL.md
      - sdk/go/internal/protocol/SKILL.md
      - sdk/python/src/cq/protocol/SKILL.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-sync:
    name: Check SKILL.md copies match source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify SDK copies match plugin source
        run: |
          source=plugins/cq/skills/cq/SKILL.md
          targets=(
            sdk/go/internal/protocol/SKILL.md
            sdk/python/src/cq/protocol/SKILL.md
          )
          failed=0
          for target in "${targets[@]}"; do
            if ! diff -q "$source" "$target" > /dev/null 2>&1; then
              echo "::error file=${target}::${target} does not match ${source}. Run 'make sync-skill' in the SDK directory."
              diff --unified "$source" "$target" || true
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "All SKILL.md copies are in sync."
