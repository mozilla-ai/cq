name: Plugin CI

on:
  push:
    branches: [main]
    paths: ["plugins/cq/**", "schema/**"]
  pull_request:
    branches: [main]
    paths: ["plugins/cq/**", "schema/**"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup and lint
        run: make setup-plugin lint-plugin
