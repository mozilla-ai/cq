services:
  cq-server:
    build: ./server
    ports:
      - "${CQ_PORT:-3000}:${CQ_PORT:-3000}"
    volumes:
      - cq-data:/data
      - ./server/scripts:/app/scripts:ro
    env_file:
      - ./server/.env
    # Variables below are declared for documentation; values come from env_file.
    environment:
      - CQ_JWT_SECRET
      - CQ_API_KEY_PEPPER
      - CQ_DISABLE_API_KEY_AUTH
      - CQ_DB_PATH
      - CQ_PORT

volumes:
  cq-data:
