repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
        exclude: '^(cli|sdk/go)/NOTICE$'
      - id: end-of-file-fixer
        exclude: '^(cli|sdk/go)/NOTICE$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: '(pnpm-lock\.yaml|uv\.lock)$'

  - repo: local
    hooks:
      - id: ty-check-install
        name: ty (scripts/install)
        entry: bash -c 'cd scripts/install && uvx ty check src/cq_install --python .venv'
        language: system
        pass_filenames: false
        types: [python]
        files: ^scripts/install/
      - id: ty-check-plugin
        name: ty (plugin)
        entry: bash -c 'uvx ty check plugins/cq/scripts/'
        language: system
        pass_filenames: false
        types: [python]
        files: ^plugins/cq/scripts/
      - id: ty-check-sdk-python
        name: ty (sdk/python)
        entry: bash -c 'cd sdk/python && uvx ty check src/cq --python .venv'
        language: system
        pass_filenames: false
        types: [python]
        files: ^sdk/python/
      - id: ty-check-server-backend
        name: ty (server/backend)
        entry: bash -c 'cd server/backend && uvx ty check src/cq_server --python .venv'
        language: system
        pass_filenames: false
        types: [python]
        files: ^server/backend/

  - repo: local
    hooks:
      - id: uv-lock-check-install
        name: uv lock --check (scripts/install)
        entry: uv lock --check --directory scripts/install
        language: system
        pass_filenames: false
        files: ^scripts/install/(pyproject\.toml|uv\.lock|uv\.toml)$
      - id: uv-lock-check-plugin
        name: uv lock --check (plugins/cq)
        entry: uv lock --check --directory plugins/cq
        language: system
        pass_filenames: false
        files: ^plugins/cq/(pyproject\.toml|uv\.lock|uv\.toml)$
      - id: uv-lock-check-sdk-python
        name: uv lock --check (sdk/python)
        entry: uv lock --check --directory sdk/python
        language: system
        pass_filenames: false
        files: ^sdk/python/(pyproject\.toml|uv\.lock|uv\.toml)$
      - id: uv-lock-check-server-backend
        name: uv lock --check (server/backend)
        entry: uv lock --check --directory server/backend
        language: system
        pass_filenames: false
        files: ^server/backend/(pyproject\.toml|uv\.lock|uv\.toml)$
